<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Star Team Board v4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FAF8F5;color:#292524;font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;line-height:1.5}

/* ヘッダー */
.header{background:#fff;border-bottom:1px solid #E7E5E4;padding:16px 28px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.15rem;font-weight:700}
.header .date{color:#A8A29E;font-size:0.85rem}

/* タブ */
.tabs{background:#fff;padding:0 28px;border-bottom:1px solid #E7E5E4;display:flex;gap:0}
.tab{padding:10px 20px;font-size:0.88rem;cursor:pointer;border-bottom:3px solid transparent;color:#A8A29E;transition:color .2s}
.tab:hover{color:#292524}
.tab.active{color:#D97706;border-bottom-color:#D97706;font-weight:600}

/* 稼働バー */
.status-bar{background:#fff;padding:8px 28px;border-bottom:1px solid #E7E5E4;font-size:.78rem;color:#A8A29E;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.status-bar .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-bar .sep{margin:0 6px;color:#E7E5E4}

/* メインコンテンツ */
.main{padding:20px 28px;position:relative}

/* カンバン */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.col-header{font-size:.82rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.col-header .badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;color:#fff;font-size:.7rem;font-weight:700}
.column{min-height:200px}

/* タスクカード共通 */
.card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;box-shadow:0 2px 8px rgba(120,100,80,.06);border-left:4px solid #E7E5E4;transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:0 4px 16px rgba(120,100,80,.13);transform:translateY(-1px)}
.card .title{font-size:.85rem;font-weight:700;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.card .title .deadline{font-size:.72rem;color:#A8A29E;font-weight:400;white-space:nowrap}
.card .purpose{font-size:.75rem;color:#A8A29E;line-height:1.4;margin-bottom:8px}
.card .meta{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:#A8A29E}
.card .assignee{display:flex;align-items:center;gap:5px}
.card .assignee .avatar{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:.65rem;font-weight:700;flex-shrink:0}
.card .created{font-size:.7rem;color:#A8A29E}

/* 承認待ちバッジ */
.approval-badge{display:inline-block;background:#FEF3C7;color:#D97706;font-size:.65rem;font-weight:600;padding:.1rem .4rem;border-radius:10px;margin-left:.3rem;vertical-align:middle}

/* 担当者ビュー */
.person-view{display:none}
.person-section{margin-bottom:24px}
.person-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:.9rem;font-weight:700}
.person-header .avatar-lg{width:40px;height:40px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem;font-weight:700;flex-shrink:0}
.person-header .name{font-size:.95rem}
.person-header .status-info{font-size:.78rem;color:#A8A29E;font-weight:400;margin-left:auto;display:flex;align-items:center;gap:4px}
.person-header .status-info .s-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.person-cards{display:flex;flex-wrap:wrap;gap:10px}
.person-cards .card{width:280px;margin-bottom:0;flex-shrink:0}
.empty-msg{color:#A8A29E;font-size:.8rem;padding:12px 16px}

/* オーバーレイ */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.15);z-index:100}
.overlay.open{display:block}

/* サイドパネル */
.panel{position:fixed;top:0;right:-400px;width:380px;height:100%;background:#fff;z-index:200;border-left:1px solid #E7E5E4;box-shadow:-4px 0 12px rgba(0,0,0,.05);transition:right .25s ease;overflow-y:auto;padding:24px}
.panel.open{right:0}
.panel .close-btn{position:absolute;top:14px;right:16px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:#A8A29E;transition:color .2s}
.panel .close-btn:hover{color:#292524}
.panel .p-title{font-size:1.1rem;font-weight:700;margin-top:8px;margin-bottom:12px;padding-right:30px}
.panel .p-divider{border:none;border-top:1px solid #E7E5E4;margin:12px 0}
.panel .p-row{font-size:.85rem;margin-bottom:6px;color:#292524}
.panel .p-row .label{color:#A8A29E}
.panel .p-section{font-size:.85rem;font-weight:700;margin:16px 0 8px;display:flex;align-items:center;gap:5px}
.panel .p-desc{font-size:.83rem;color:#292524;background:#FAF8F5;border-radius:8px;padding:12px;line-height:1.6}
.panel .p-impact{font-size:.83rem;color:#059669;font-weight:600;background:#FAF8F5;border-radius:8px;padding:12px}
.panel textarea{width:100%;height:120px;border:1px solid #E7E5E4;border-radius:8px;padding:10px;font-size:.83rem;font-family:inherit;resize:vertical;outline:none;transition:border-color .2s}
.panel textarea:focus{border-color:#D97706}
.panel .save-btn{margin-top:8px;padding:6px 16px;background:#D97706;color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;transition:background .2s}
.panel .save-btn:hover{background:#B45309}

/* フッター */
.footer{text-align:center;padding:16px;font-size:.75rem;color:#A8A29E;border-top:1px solid #E7E5E4;margin-top:12px}
</style>
</head>

};

var PEOPLE = [
  {"key": "Ren", "name": "Ren", "initial": "R", "color": "#D97706", "statusLabel": "判断待ち"},
  {"key": "Kate", "name": "Kate", "initial": "K", "color": "#EC4899", "statusLabel": "作業中"},

];

var currentTask = null;

/* アバター初期値の取得 */
function getAvatarInitial(name) {
  if (!name) return "";
  var n = name.replace(/\s/g,"");
  for (var i = 0; i < PEOPLE.length; i++) {
    if (n === PEOPLE[i].key || n === PEOPLE[i].name) return PEOPLE[i].initial;
  }
  return name.charAt(0).toUpperCase();
}
function getAvatarColor(task) {
  if (task.assignee_color) return task.assignee_color;
  var n = (task.assignee || "").replace(/\s/g,"");
  for (var i = 0; i < PEOPLE.length; i++) {
    if (n === PEOPLE[i].key) return PEOPLE[i].color;
  }
  return "#A8A29E";
}

/* カード HTML 生成（共通） */
function renderCard(task) {
  var col = COLUMNS[task.column];
  var borderColor = col ? col.color : "#E7E5E4";
  var html = '<div class="card" style="border-left-color:' + borderColor + '" onclick="openPanel(\'' + task.id + '\')">';
  html += '<div class="title"><span>' + task.title;
  if (task.needs_approval) html += '<span class="approval-badge">🔒 承認待ち</span>';
  html += '</span>';
  if (task.deadline) html += '<span class="deadline">' + task.deadline + '</span>';
  html += '</div>';
  if (task.purpose) html += '<div class="purpose">' + task.purpose + '</div>';
  html += '<div class="meta">';
  if (task.assignee) {
    html += '<div class="assignee"><span class="avatar" style="background:' + getAvatarColor(task) + '">' + getAvatarInitial(task.assignee) + '</span> ' + task.assignee + '</div>';
  } else {
    html += '<div></div>';
  }
  html += '<div class="created">作成: ' + task.created_by + ' ' + task.created_at + '</div>';
  html += '</div></div>';
  return html;
}

/* タスクビュー（カンバン）描画 */
function renderTaskView() {
  var container = document.getElementById("taskView");
  var html = '<div class="kanban">';
  var colKeys = ["todo","in_progress","watching","done"];
  for (var c = 0; c < colKeys.length; c++) {
    var key = colKeys[c];
    var col = COLUMNS[key];
    var colTasks = TASKS.filter(function(t){ return t.column === key; });
    html += '<div class="column">';
    html += '<div class="col-header"><span class="badge" style="background:' + col.color + '">' + colTasks.length + '</span> ' + col.label + '</div>';
    for (var i = 0; i < colTasks.length; i++) {
      html += renderCard(colTasks[i]);
    }
    html += '</div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

/* 担当者ビュー描画 */
function renderPersonView() {
  var container = document.getElementById("personView");
  var html = '';

  /* 人ごとのセクション */
  for (var p = 0; p < PEOPLE.length; p++) {
    var person = PEOPLE[p];
    var personTasks = TASKS.filter(function(t){
      if (!t.assignee) return false;
      return t.assignee.replace(/\s/g,"") === person.key;
    });
    /* 完了タスクは人セクションには出さない */
    personTasks = personTasks.filter(function(t){ return t.column !== "done"; });

    var statusDotColor = personTasks.length > 0 ? "#059669" : "#A8A29E";
    var statusText = person.statusLabel;

    html += '<div class="person-section">';
    html += '<div class="person-header">';
    html += '<span class="avatar-lg" style="background:' + person.color + '">' + person.initial + '</span>';
    html += '<span class="name">' + person.name + '</span>';
    html += '<span class="status-info"><span class="s-dot" style="background:' + statusDotColor + '"></span> ' + statusText + '  ' + personTasks.length + '件</span>';
    html += '</div>';
    html += '<div class="person-cards">';
    if (personTasks.length === 0) {
      html += '<div class="empty-msg">（今週のタスクなし）</div>';
    } else {
      for (var i = 0; i < personTasks.length; i++) {
        html += renderCard(personTasks[i]);
      }
    }
    html += '</div></div>';
  }

  /* 観測中（人に紐付かない） */
  var watchTasks = TASKS.filter(function(t){ return t.column === "watching"; });
  if (watchTasks.length > 0) {
    html += '<div class="person-section">';
    html += '<div class="person-header">';
    html += '<span class="avatar-lg" style="background:#D97706;font-size:1.1rem">⏳</span>';
    html += '<span class="name">観測中</span>';
    html += '<span class="status-info">' + watchTasks.length + '件</span>';
    html += '</div>';
    html += '<div class="person-cards">';
    for (var i = 0; i < watchTasks.length; i++) {
      html += renderCard(watchTasks[i]);
    }
    html += '</div></div>';
  }

  /* 完了 */
  var doneTasks = TASKS.filter(function(t){ return t.column === "done"; });
  if (doneTasks.length > 0) {
    html += '<div class="person-section">';
    html += '<div class="person-header">';
    html += '<span class="avatar-lg" style="background:#059669;font-size:1.1rem">✅</span>';
    html += '<span class="name">完了</span>';
    html += '<span class="status-info">' + doneTasks.length + '件</span>';
    html += '</div>';
    html += '<div class="person-cards">';
    for (var i = 0; i < doneTasks.length; i++) {
      html += renderCard(doneTasks[i]);
    }
    html += '</div></div>';
  }

  container.innerHTML = html;
}

/* タスクをIDで検索 */
function findTask(id) {
  for (var i = 0; i < TASKS.length; i++) {
    if (TASKS[i].id === id) return TASKS[i];
  }
  return null;
}

/* タブ切り替え */
function switchTab(t) {
  document.querySelectorAll('.tab').forEach(function(el, i) {
    el.classList.toggle('active', i === (t === 'task' ? 0 : 1));
  });
  document.getElementById('taskView').style.display = t === 'task' ? 'block' : 'none';
  document.getElementById('personView').style.display = t === 'person' ? 'block' : 'none';
}

/* パネル開く */
function openPanel(id) {
  var t = findTask(id);
  if (!t) return;
  currentTask = id;
  var col = COLUMNS[t.column];
  /* タイトル（承認待ちバッジ付き） */
  var titleEl = document.getElementById('pTitle');
  if (t.needs_approval) {
    titleEl.innerHTML = t.title + ' <span class="approval-badge">🔒 承認待ち</span>';
  } else {
    titleEl.textContent = t.title;
  }
  /* 担当者（アバター付き） */
  var assigneeEl = document.getElementById('pAssignee');
  if (t.assignee) {
    assigneeEl.innerHTML = '<span style="display:inline-flex;align-items:center;gap:4px"><span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:' + getAvatarColor(t) + ';color:#fff;font-size:.6rem;font-weight:700">' + getAvatarInitial(t.assignee) + '</span> ' + t.assignee + '</span>';
  } else {
    assigneeEl.textContent = '—';
  }
  /* ステータス（承認待ちの場合は追記） */
  var statusText = col ? col.label : '—';
  if (t.needs_approval) statusText += ' · 🔒 承認待ち';
  document.getElementById('pStatus').textContent = statusText;
  document.getElementById('pDeadline').textContent = t.deadline || '—';
  document.getElementById('pCreated').textContent = t.created_by + ' · ' + t.created_at;
  document.getElementById('pPurpose').textContent = t.purpose || '—';
  document.getElementById('pImpact').textContent = t.impact || '—';
  document.getElementById('pDesc').textContent = t.description;
  /* メモ読み込み */
  var memo = localStorage.getItem('memo_' + id) || '';
  document.getElementById('pMemo').value = memo;
  document.getElementById('saveBtn').textContent = '保存';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}

/* パネル閉じる */
function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  currentTask = null;
}

/* メモ保存 */
function saveMemo() {
  if (!currentTask) return;
  var memo = document.getElementById('pMemo').value;
  localStorage.setItem('memo_' + currentTask, memo);
  var btn = document.getElementById('saveBtn');
  btn.textContent = '保存しました ✓';
  setTimeout(function(){ btn.textContent = '保存'; }, 1500);
}

/* ESCで閉じる */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePanel();
});

/* 初期描画 */
renderTaskView();
renderPersonView();
</script>
</body>
</html>
